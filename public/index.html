<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
    <!-- AXIOS -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css" type="text/css" />
    <title>Book Tracker</title>
  </head>
  <body>
    <!-- AUTH SECTION -->
    <section id="auth" class="auth">
      <header>
        <div class="heading">
          <img src="./images/burning-book.svg" alt="Icon of burning book" />
          <div class="title-wrapper">
            <h1 class="title">My Book Tracker</h1>
            <h2 class="subtitle">Track your reading journey</h2>
          </div>
        </div>
      </header>

      <!-- LOGIN -->
      <div id="login-view" class="auth-container login-view">
        <div class="welcome-message">
          <h3>Welcome Back</h3>
          <p>Log in to access your book collection</p>
        </div>

        <form id="login-form" class="auth-form">
          <div class="auth-details">
            <label for="login-email">Email</label>
            <input
              id="login-email"
              type="email"
              name="login-email"
              placeholder="youremail@example.com"
              required
            />
          </div>
          <div class="auth-details">
            <label for="login-password">Password</label>

            <input
              id="login-password"
              type="password"
              name="login-password"
              placeholder="**********"
              required
            />
          </div>
          <button class="cta-btn">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Log in
          </button>
          <button id="demo-btn" class="cta-btn" type="button">
            Try Demo Account
          </button>
        </form>

        <button id="show-signup" class="cta-link">
          Don't have an account? Sign up
        </button>
      </div>

      <!-- SIGN UP -->
      <div id="signup-view" class="auth-container signup-view hidden">
        <div class="welcome-message">
          <h3>Create Account</h3>
          <p>Sign up to start tracking your books</p>
        </div>

        <form id="signup-form" class="auth-form">
          <div class="auth-details">
            <label for="full-name">Full Name</label>
            <input
              id="full-name"
              type="text"
              name="full-name"
              placeholder="John Doe"
              required
            />
            <label for="signup-email">Email</label>
            <input
              id="signup-email"
              type="email"
              name="signup-email"
              placeholder="johndoe@example.com"
              required
            />
          </div>
          <div class="auth-details">
            <label for="signup-password">Password</label>

            <input
              id="signup-password"
              type="password"
              name="signup-password"
              placeholder="**********"
              required
            />
          </div>
          <button class="cta-btn">
            <i class="fa-solid fa-user-plus"></i> Sign Up
          </button>
        </form>

        <button id="show-login" class="cta-link">
          Already have an account? Log in
        </button>
      </div>
    </section>

    <!-- MAIN APP -->
    <div id="app" class="app hidden">
      <!-- Header -->
      <header>
        <div class="heading">
          <img src="./images/burning-book.svg" alt="Icon of burning book" />
          <div class="title-wrapper">
            <h1 class="title">My Book Tracker</h1>
            <h2 class="subtitle">Track your reading journey</h2>
          </div>
        </div>
        <div class="login-menu">
          <div class="login-info">
            <span class="login-status">Logged in as</span>
            <span class="login-email">demo@booktracker.com</span>
          </div>
          <button id="log-out-btn" class="app-btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out
          </button>
        </div>
      </header>
      <button id="add-book-btn" class="app-btn">+ Add Book</button>
      <main>
        <!-- Dashboard Elements -->
        <section id="dashboard" class="dashboard"></section>

        <!-- Search Field -->
        <section class="search">
          <form id="search-form" class="search-form">
            <div class="search-wrapper">
              <span class="search-icon"
                ><i class="fa-solid fa-magnifying-glass"></i
              ></span>
              <input
                id="search-field"
                class="search-field"
                type="search"
                placeholder="Search books or authors..."
              />
            </div>

            <!-- Search Select Options -->
            <select
              id="search-select"
              class="search-select"
              name="search-options"
            ></select>
          </form>
        </section>

        <!-- Books Cards -->
        <section id="books" class="books"></section>

        <!-- Add Book Modal -->
        <section id="modal" class="modal">
          <button
            id="close-book-form"
            class="close-book-form fa-solid fa-xmark fa-1x"
          ></button>
          <h2>Add New Book</h2>
          <form id="add-book-form" class="add-book-form">
            <label for="title">Title*</label>
            <input type="text" name="title" id="add-book-title" required />

            <label for="author">Author*</label>
            <input type="text" name="author" id="add-book-author" required />

            <label for="cover">Cover Image URL</label>
            <input
              type="text"
              name="cover"
              id="add-book-cover"
              placeholder="http://example.com/image.jpg"
            />
            <p class="add-book-info">Leave blank for default cover*</p>

            <label for="status">Status</label>
            <select name="status" id="add-book-status">
              <option value="want">Want to Read</option>
              <option value="reading">Reading</option>
              <option value="finished">Finished</option>
            </select>

            <label for="rating">Rating (0-5)</label>
            <input
              type="number"
              name="rating"
              placeholder="0"
              min="0"
              max="5"
            />

            <label for="note">Notes</label>
            <textarea
              name="note"
              id="add-book-note"
              placeholder="Your thoughts about this book..."
            ></textarea>
            <button class="add-btn">+ Add Book</button>
          </form>
        </section>
      </main>
    </div>
    <script src="/js/main.js" type="module"></script>
  </body>
</html>
