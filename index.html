<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
    <!-- JS -->
    <script defer src="./main.js" type="module"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <title>Book Tracker</title>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="heading">
        <img src="./images/burning-book.svg" alt="Icon of burning book" />
        <div class="title-wrapper">
          <h1 class="title">My Book Tracker</h1>
          <h2 class="subtitle">Track your reading journey</h2>
        </div>
      </div>
      <button id="add-book-btn" class="add-book-btn">+ Add Book</button>
    </header>
    <main>
      <!-- Dashboard Elements -->
      <section id="dashboard" class="dashboard"></section>

      <!-- Search Field -->
      <section class="search">
        <form id="search-form" class="search-form">
          <div class="search-wrapper">
            <span class="search-icon"
              ><i class="fa-solid fa-magnifying-glass"></i
            ></span>
            <input
              id="search-field"
              class="search-field"
              type="search"
              placeholder="Search books or authors..."
            />
          </div>

          <!-- Search Select Options -->
          <select
            id="search-select"
            class="search-select"
            name="search-options"
          ></select>
        </form>
      </section>

      <!-- Books Cards -->
      <section id="books" class="books"></section>

      <!-- Add Book Modal -->
      <section id="modal" class="modal">
        <button
          id="close-book-form"
          class="close-book-form fa-solid fa-xmark fa-1x"
        ></button>
        <h2>Add New Book</h2>
        <form class="add-book-form">
          <label for="add-book-title">Title*</label>
          <input
            type="text"
            name="add-book-title"
            id="add-book-title"
            required
          />

          <label for="add-book-author">Author*</label>
          <input
            type="text"
            name="add-book-author"
            id="add-book-author"
            required
          />

          <label for="add-book-cover">Cover Image URL</label>
          <input
            type="text"
            name="add-book-cover"
            id="add-book-cover"
            placeholder="http://example.com/image.jpg"
          />
          <p class="add-book-info">Leave blank for default cover*</p>

          <label for="add-book-status">Status</label>
          <select name="add-book-status" id="add-book-status">
            <option value="want">Want to Read</option>
            <option value="reading">Reading</option>
            <option value="finished">Finished</option>
          </select>

          <label for="add-book-rating">Rating (0-5)</label>
          <input type="number" name="add-book-rating" placeholder="0" />

          <label for="add-book-note">Notes</label>
          <textarea
            name="add-book-note"
            id="add-book-note"
            placeholder="Your thoughts about this book..."
          ></textarea>
          <button class="add-btn">+ Add Book</button>
        </form>
      </section>
    </main>
  </body>
</html>
